<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cliente API - Registro / Login</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:720px;margin:32px auto;padding:0 16px}
    h1{font-size:20px}
    form{border:1px solid #ddd;padding:16px;border-radius:6px;margin-bottom:16px}
    label{display:block;margin-bottom:8px}
    input{width:100%;padding:8px;margin-top:4px;margin-bottom:12px}
    button{padding:8px 12px}
    #output{white-space:pre-wrap;background:#f7f7f7;padding:12px;border-radius:6px;border:1px solid #eee}
  </style>
</head>
<body>
  <h1>Cliente sencillo para la API</h1>

  <form id="registerForm">
    <h2>Registrar</h2>
    <label>Usuario
      <input name="user" type="text" required>
    </label>
    <label>Contraseña
      <input name="password" type="password" required>
    </label>
    <button type="submit">Registrar</button>
  </form>

  <form id="loginForm">
    <h2>Iniciar sesión</h2>
    <label>Usuario
      <input name="user" type="text" required>
    </label>
    <label>Contraseña
      <input name="password" type="password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>

  <h2>Salida</h2>
  <div id="output">Esperando acciones...</div>

  <script>
    const out = document.getElementById('output');

    function show(obj){ out.textContent = JSON.stringify(obj, null, 2); }

    async function post(path, body){
      try{
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json().catch(()=>({}));
        return { status: res.status, ok: res.ok, data };
      }catch(err){
        return { error: err.message };
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = { user: fd.get('user'), password: fd.get('password') };
      show({ action: 'register', sending: body });
      const r = await post('/register', body);
      show(r);
    });

    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = { user: fd.get('user'), password: fd.get('password') };
      show({ action: 'login', sending: body });
      const r = await post('/login', body);
      show(r);
    });
  </script>
</body>
</html>
